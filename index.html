<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber City</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  background:#050505;
  color:white;
}

/* NAVBAR */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  z-index:1000;
}

nav h1{
  color:#ff0033;
  letter-spacing:2px;
}

nav ul{
  display:flex;
  gap:30px;
  list-style:none;
}

nav ul li{
  cursor:pointer;
  opacity:0.7;
}

nav ul li:hover{
  color:#ff0033;
  opacity:1;
}

/* HERO */
.hero{
  height:100vh;
  background:url('character.png') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

.hero-content{
  position:relative;
  z-index:1;
}

.hero h1{
  font-size:50px;
  color:#ff0033;
  margin-bottom:20px;
  text-shadow:0 0 15px #ff0033;
}

.hero p{
  opacity:0.8;
  margin-bottom:30px;
}

.buttons{
  display:flex;
  gap:20px;
}

.btn{
  padding:15px 30px;
  border:none;
  cursor:pointer;
  transition:0.3s;
}

.primary{
  background:#ff0033;
  color:white;
  box-shadow:0 0 20px #ff0033;
}

.secondary{
  background:transparent;
  border:1px solid #888;
  color:white;
}

.primary:hover{
  transform:scale(1.1);
}

.secondary:hover{
  border-color:#ff0033;
}

/* POSTS */
.posts{
  padding:80px 40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#111;
  border:1px solid rgba(255,0,50,0.2);
  padding:15px;
  transition:0.3s;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card h3{
  margin:10px 0;
}

.card p{
  font-size:14px;
  opacity:0.7;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px #ff0033;
}

/* PLAY SECTION */
.play{
  text-align:center;
  padding:100px 20px;
}

.play button{
  padding:20px 50px;
  font-size:20px;
  background:#ff0033;
  border:none;
  color:white;
  box-shadow:0 0 30px #ff0033;
  cursor:pointer;
}

.play button:hover{
  transform:scale(1.1);
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  border-top:1px solid #222;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>

<nav>
  <h1>CYBER CITY</h1>
  <ul>
    <li>MAP</li>
    <li>FACTIONS</li>
    <li>ARSENAL</li>
    <li>INTEL</li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>CYBER CITY</h1>
    <p>Survive the system. Control the chaos.</p>

    <div class="buttons">
      <button class="btn primary">INITIATE</button>
      <button class="btn secondary">BROWSE</button>
    </div>
  </div>
</section>

<section class="posts">
  <div class="grid">
    <div class="card">
      <img src="img1.jpg">
      <h3>SECTOR BREACH</h3>
      <p>Massive firewall collapse detected.</p>
    </div>

    <div class="card">
      <img src="img2.jpg">
      <h3>MERCENARY SURGE</h3>
      <p>Heavy armored units deployed.</p>
    </div>

    <div class="card">
      <img src="img3.jpg">
      <h3>NEURAL SYSTEM</h3>
      <p>New firmware stabilizing AI nodes.</p>
    </div>
  </div>
</section>

<section class="play">
  <h2>JOIN THE RESISTANCE</h2>
  <br>
  <button>PLAY NOW ▶</button>
</section>

<footer>
  CYBER CITY © 2077
</footer>

</body>
</html>
